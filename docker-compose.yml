services:
  strengthsync:
    build: .
    container_name: strengthsync
    ports:
      - "5000:5000"
    volumes:
      # All user data persists across restarts and updates:
      #   data/exercise_mappings.db  — your saved exercise mappings
      #   data/hevy_cache.csv        — cached Hevy CSV export
      #   data/uploads/current.fit   — last uploaded Garmin FIT file (session survives restart)
      - ./data:/app/data
      # merged FIT files — re-downloadable from the History tab at any time
      - ./output:/app/output
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      # Set a fixed SECRET_KEY so sessions survive container restarts.
      # Generate one with: python -c "import secrets; print(secrets.token_hex(32))"
      # If unset, a new random key is generated on every startup — invalidating all active sessions.
      - SECRET_KEY=change-me-to-a-long-random-string
    restart: unless-stopped
